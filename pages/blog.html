<!DOCTYPE html>
<html lang="en-us">
<head>
    <title>debang5hu</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/styles.css" />
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="/assets/js/sidebar.js" defer></script>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            padding-left: 300px;
        }

        .site-content {
            padding: 80px 64px;
        }

        .blog-inner {
            width: 100%;
            max-width: 680px;
        }

        .page-label {
            font-size: 13px;
            color: #58ED24;
            letter-spacing: 0.12em;
            margin-bottom: 32px;
            text-align: left;
        }

        .blog-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
            padding: 18px 0;
            border-bottom: 1px solid #1a1a1a;
            text-decoration: none;
        }

        .blog-row:first-of-type {
            border-top: 1px solid #1a1a1a;
        }

        .blog-title {
            font-size: 15px;
            color: #ccc;
            letter-spacing: 0.01em;
            transition: color 0.15s;
            font-family: 'JetBrains Mono', monospace;
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .blog-date {
            font-size: 12px;
            color: #919191;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
            transition: color 0.15s;
            font-family: 'JetBrains Mono', monospace;
            text-align: right;
        }

        .blog-row:hover .blog-title {
            color: #1e90ff;
            text-shadow: 0 0 24px rgba(30, 144, 255, 0.3);
        }

        .blog-row:hover .blog-date {
            color: #444;
        }

        /* tablet */
        @media (max-width: 768px) {
            body { padding-left: 0; }

            .site-content { padding: 40px 28px 60px; }

            .blog-title { font-size: 14px; }
            .blog-date  { font-size: 11px; }
        }

        /* mobile */
        @media (max-width: 480px) {
            .site-content { padding: 28px 20px 56px; }

            .blog-row {
                flex-direction: column;
                gap: 4px;
                padding: 14px 0;
            }

            .blog-title { font-size: 13px; }
            .blog-date  { font-size: 11px; color: #333; }
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <main class="site-content">
        <div class="blog-inner">
            <div class="page-label">// blogs</div>

            <div class="blog-list">
                <a class="blog-row" href="https://medium.com/@debang5hu/breaking-it-during-a-hackathon-bb2f56da2ab7" target="_blank">
                    <span class="blog-title">Breaking it during a Hackathon</span>
                    <span class="blog-date">apr 2026</span>
                </a>
                <a class="blog-row" href="https://medium.com/@debang5hu/fluffy-write-up-hackthebox-season-8-294d7d301079" target="_blank">
                    <span class="blog-title">Fluffy Writeup · HTB Season 8</span>
                    <span class="blog-date">aug 2025</span>
                </a>
                <a class="blog-row" href="https://medium.com/@debang5hu/payatu-hiring-ctf-2025-2fa2918abb64" target="_blank">
                    <span class="blog-title">Payatu Hiring CTF Writeup</span>
                    <span class="blog-date">jun 2025</span>
                </a>
                <a class="blog-row" href="https://github.com/Debang5hu/ctf-writeups/blob/main/writeups/oh_my_posh.md" target="_blank">
                    <span class="blog-title">Beautify Terminal with Oh My Posh</span>
                    <span class="blog-date">may 2025</span>
                </a>
                <a class="blog-row" href="https://medium.com/@debang5hu/titanic-write-up-hackthebox-season-7-7b882d688e07" target="_blank">
                    <span class="blog-title">Titanic Writeup · HTB Season 7</span>
                    <span class="blog-date">apr 2025</span>
                </a>
                <a class="blog-row" href="https://github.com/Debang5hu/ctf-writeups/blob/main/writeups/timeb0mb.md" target="_blank">
                    <span class="blog-title">timeb0mb CTF Writeup</span>
                    <span class="blog-date">apr 2025</span>
                </a>
                <a class="blog-row" href="https://medium.com/@debang5hu/discovering-and-reporting-a-reflective-xss-vulnerability-8c5e14206d17" target="_blank">
                    <span class="blog-title">Discovering improper input handling in blackbox</span>
                    <span class="blog-date">feb 2025</span>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
